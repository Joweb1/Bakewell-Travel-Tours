name: Build and Deploy to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        env:
          VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
          VITE_EMAILJS_TEMPLATE_ID_COMPANY: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID_COMPANY }}
          VITE_EMAILJS_TEMPLATE_ID_CLIENT: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID_CLIENT }}
          VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}
          VITE_EMAILJS_PRIVATE_KEY: ${{ secrets.VITE_EMAILJS_PRIVATE_KEY }}
        run: npm run build

      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          # Deploy directly to the main web root. 
          # Adjust if deploying to a subdirectory (e.g., public_html/subfolder/)
          server-dir: public_html/
          # Only sync changed files to prevent bandwidth/quota limits and speed up deployment
          dangerous-clean-slate: false
          # SFTP or FTPS is recommended if your server supports it
          protocol: ftp
          port: 21
